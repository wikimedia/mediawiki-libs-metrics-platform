# Autogenerated by pipeline-to-gitlab
include:
  - project: 'repos/releng/kokkuri'
    file: 'includes/images.yaml'

variables:
  GIT_SUBMODULE_STRATEGY: recursive

stages:
  - test
  - deploy

.test-client:
  # Job template: all client library tests
  extends: .kokkuri:build-and-run-image
  stage: test
  tags:
    - wmcs
  variables:
    BUILD_VARIANT: test

.java:
  changes:
    - .mvn/**/*
    - java/**/*
    - mvnw
    - mvwn.cmnd
  include:
    ref: 0.1.0

test-java:
  stage: test
  # Run tests for Java client library
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
      changes: !reference [ .java, changes ]
  trigger:
    strategy: depend
    include:
      - project: 'repos/maven/wmf-maven-ci'
        file: 'templates/mvn.yml'
        ref: !reference [ .java, include, ref ]
        inputs:
          pom-dir: java
          stages:
            - verify
          workflow-rules:
            - if: $CI_PIPELINE_SOURCE == "parent_pipeline"

test-js:
  # Run tests for Javascript client library
  extends: .test-client
  rules:
    - changes:
        - js/**/*
  variables:
    BUILD_CONTEXT: js

.test-client-php:
  # Job template: PHP client library tests
  extends: .test-client
  rules:
    - changes:
        - .phan/**/*
        - .pipeline/blubber-php.yaml
        - php/**/*
        - tests/consistency/*.php
        - tests/consistency/php/*
        - .phpcs.xml
        - composer.json
        - composer.lock
  variables:
    BUILD_CONFIG: .pipeline/blubber-php.yaml
    # Use the job name as the blubber build variant
    BUILD_VARIANT: "${CI_JOB_NAME}"

test-php74:
  # Run tests for PHP client library with PHP 7.4 runtime
  extends: .test-client-php

test-php81:
  # Run tests for PHP client library with PHP 8.1 runtime
  extends: .test-client-php

test-swift:
  extends: .test-client
  rules:
    - changes:
        - swift/**/*
  variables:
    BUILD_CONTEXT: swift

deploy-java:
  stage: deploy
  # Run tests for Java client library
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes: !reference [ .java, changes ]
  trigger:
    strategy: depend
    include:
      - project: 'repos/maven/wmf-maven-ci'
        file: 'templates/mvn.yml'
        ref: !reference [ .java, include, ref ]
        inputs:
          pom-dir: java
          stages:
            - verify
            - deploy
          workflow-rules:
            - if: $CI_PIPELINE_SOURCE == "parent_pipeline"
